<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YELLITAARE">
<meta name="description" content="YELLITAARE Thidé — Organisation Communautaire Inclusive — Adhésion en ligne">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231A5C2A'/><text x='50' y='62' text-anchor='middle' font-family='serif' font-size='40' font-weight='bold' fill='white'>YT</text></svg>">
<title>YELLITAARE Thidé — Organisation Communautaire Inclusive</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<style>
:root{
  --vert:#1A5C2A;--vert-mid:#2E7D32;--vert-clair:#E8F5E9;--vert-pale:#F1F9F2;
  --or:#C9982A;--or-clair:#FDF6E3;--or-fonce:#9B7015;
  --sable:#F5F0E8;--terre:#3D2B1F;--blanc:#FDFCF8;--gris:#6B7280;--gris-clair:#F3F4F6;
  --radius:12px;--nav-h:72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--blanc);color:var(--terre);overflow-x:hidden}
img{max-width:100%}
a{color:inherit;text-decoration:none}

/* ═══ NAV ═══════════════════════════════════════════════════════════════ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;
  background:rgba(253,252,248,.94);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(26,92,42,.1);
  transition:box-shadow .3s;
}
nav.scrolled{box-shadow:0 4px 24px rgba(26,92,42,.1)}
.nav-logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.nav-logo img{
  height:42px;width:auto;object-fit:contain;display:block;flex-shrink:0;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.08));
}
.nav-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--vert)}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-links a,.nav-links button{
  padding:8px 14px;border-radius:8px;
  font-size:14px;font-weight:500;color:var(--terre);opacity:.75;
  background:none;border:none;cursor:pointer;
  transition:opacity .2s,background .2s;font-family:'Outfit',sans-serif;
}
.nav-links a:hover,.nav-links button:hover,.nav-links a.active,.nav-links button.active{opacity:1;background:var(--vert-clair);color:var(--vert)}
.nav-cta{
  padding:9px 22px;border-radius:40px;
  background:var(--vert);color:#fff;
  font-size:13px;font-weight:600;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;
  transition:background .2s,transform .15s;
}
.nav-cta:hover{background:var(--vert-mid);transform:translateY(-1px)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:8px}
.hamburger span{display:block;width:22px;height:2px;background:var(--vert);border-radius:2px;transition:.3s}
.lang-toggle{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;border:1.5px solid var(--or);color:var(--or);background:var(--or-clair);font-family:'Outfit',sans-serif;transition:.2s}
.lang-toggle:hover{background:var(--or);color:#fff}

/* ═══ MOBILE NAV ════════════════════════════════════════════════════════ */
.mobile-menu{
  display:none;position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;z-index:190;
  background:var(--blanc);padding:24px;overflow-y:auto;
}
.mobile-menu.open{display:flex;flex-direction:column;gap:4px}
.mobile-menu button{
  padding:14px 16px;border-radius:10px;text-align:left;
  font-size:16px;font-weight:500;background:none;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;color:var(--terre);
  transition:background .15s;
}
.mobile-menu button:hover{background:var(--vert-clair);color:var(--vert)}
.mobile-menu .mob-cta{
  margin-top:12px;padding:14px;border-radius:40px;
  background:var(--vert);color:#fff;text-align:center;font-weight:600;
}

/* ═══ PAGES ═════════════════════════════════════════════════════════════ */
.page{display:none;padding-top:var(--nav-h);animation:pageIn .35s ease both}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ═══ COMPOSANTS COMMUNS ════════════════════════════════════════════════ */
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.section-wrap{padding:80px 48px}
.section-wrap.alt{background:var(--sable)}
.section-wrap.dark{background:var(--vert);color:#fff}
.section-label{font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--or-fonce);margin-bottom:10px}
.section-label.light{color:rgba(255,255,255,.6)}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,44px);font-weight:900;color:var(--vert);line-height:1.15;margin-bottom:14px}
.section-title.light{color:#fff}
.section-sub{font-size:16px;color:var(--gris);line-height:1.7;max-width:580px}
.section-sub.light{color:rgba(255,255,255,.72)}
.section-head{margin-bottom:48px}
.flex-between{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px}

/* Boutons */
.btn{padding:12px 28px;border-radius:40px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:.2s}
.btn-primary{background:var(--vert);color:#fff;box-shadow:0 4px 16px rgba(26,92,42,.25)}
.btn-primary:hover{background:var(--vert-mid);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,92,42,.3)}
.btn-outline{background:transparent;border:1.5px solid var(--vert);color:var(--vert)}
.btn-outline:hover{background:var(--vert-clair);transform:translateY(-1px)}
.btn-gold{background:var(--or);color:#fff;box-shadow:0 4px 16px rgba(201,152,42,.3)}
.btn-gold:hover{background:var(--or-fonce);transform:translateY(-2px)}
.btn-white{background:#fff;color:var(--vert);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.btn-white:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.15)}

/* Cards */
.card{background:#fff;border-radius:var(--radius);border:1px solid rgba(26,92,42,.09);padding:28px;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.09)}
.card-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.card-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* Tag / badge */
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.tag-green{background:var(--vert-clair);color:var(--vert)}
.tag-gold{background:var(--or-clair);color:var(--or-fonce)}
.tag-red{background:#FEE2E2;color:#991B1B}
.tag-grey{background:var(--gris-clair);color:var(--gris)}

/* Forms */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.form-group label{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--vert)}
.form-group label .req{color:var(--or)}
.form-group input,.form-group select,.form-group textarea{
  padding:11px 14px;border:1.5px solid #E5E7EB;border-radius:var(--radius);
  font-family:'Outfit',sans-serif;font-size:14px;color:var(--terre);background:#fff;
  outline:none;transition:border-color .18s,box-shadow .18s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--vert);box-shadow:0 0 0 3px rgba(26,92,42,.08);
}
.form-group .hint{font-size:11.5px;color:var(--gris)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
.form-grid .full{grid-column:1/-1}

/* Fade in */
.fade{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
.fade.show{opacity:1;transform:none}

/* Progress bar */
.progress-bar{height:5px;background:var(--vert-clair);border-radius:3px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--vert),var(--or));border-radius:3px;transition:width 1s ease}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:20px;padding-bottom:28px;position:relative}
.tl-dot{flex-shrink:0;width:14px;height:14px;border-radius:50%;background:var(--or);margin-top:4px;position:relative;z-index:1}
.tl-item:not(:last-child) .tl-dot::after{content:'';position:absolute;top:14px;left:6px;width:2px;height:calc(100% + 14px);background:rgba(201,152,42,.25)}
.tl-date{font-size:12px;font-weight:600;color:var(--or-fonce);min-width:90px;margin-top:3px}
.tl-content h4{font-size:15px;font-weight:600;color:var(--terre);margin-bottom:4px}
.tl-content p{font-size:13px;color:var(--gris);line-height:1.6}

/* Accordion */
.accordion-item{border-bottom:1px solid rgba(26,92,42,.1)}
.accordion-btn{
  width:100%;padding:18px 0;display:flex;justify-content:space-between;align-items:center;
  background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:15px;font-weight:600;color:var(--terre);text-align:left;
}
.accordion-btn .icon{font-size:20px;color:var(--vert);transition:transform .25s;flex-shrink:0}
.accordion-btn.open .icon{transform:rotate(45deg)}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.accordion-body.open{max-height:300px}
.accordion-body p{padding-bottom:16px;font-size:14px;color:var(--gris);line-height:1.7}

/* Stat strip */
.stat-strip{display:grid;gap:0}
.stat-strip-item{padding:32px;text-align:center;border-right:1px solid rgba(255,255,255,.1)}
.stat-strip-item:last-child{border-right:none}
.stat-big{font-family:'Playfair Display',serif;font-size:52px;font-weight:900;color:var(--or);line-height:1}
.stat-desc{font-size:13px;color:rgba(255,255,255,.7);margin-top:8px;line-height:1.5}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{background:var(--vert);color:#fff;padding:12px 16px;text-align:left;font-weight:600}
.tbl td{padding:12px 16px;border-bottom:1px solid var(--gris-clair)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:nth-child(even) td{background:var(--gris-clair)}

/* Page hero (inner pages) */
.page-hero{
  background:var(--vert);padding:80px 48px 60px;
  position:relative;overflow:hidden;
}
.page-hero::after{
  content:'';position:absolute;right:-80px;top:-80px;
  width:400px;height:400px;border-radius:50%;
  background:rgba(201,152,42,.08);pointer-events:none;
}
.breadcrumb{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px}
.breadcrumb span{color:rgba(255,255,255,.8)}
.page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(32px,4.5vw,52px);font-weight:900;color:#fff;line-height:1.1;margin-bottom:12px}
.page-hero p{font-size:16px;color:rgba(255,255,255,.72);max-width:560px;line-height:1.6}

/* Footer */
footer{background:var(--terre);color:rgba(255,255,255,.7);padding:64px 48px 32px}
.footer-inner{max-width:1100px;margin:0 auto}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
.footer-brand{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#fff;margin-bottom:10px}
.footer-tagline{font-size:13px;line-height:1.7;opacity:.65;margin-bottom:16px}
.footer-badges{display:flex;gap:8px;flex-wrap:wrap}
.f-badge{padding:4px 10px;border-radius:20px;font-size:11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.65)}
.footer-col h4{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#fff;margin-bottom:14px}
.footer-col button{display:block;font-size:13px;color:rgba(255,255,255,.6);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;margin-bottom:8px;text-align:left;transition:color .2s;padding:0}
.footer-col button:hover{color:#fff}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:24px;display:flex;justify-content:space-between;font-size:12px;opacity:.4;flex-wrap:wrap;gap:8px}

/* ═══ PAGE ACCUEIL ════════════════════════════════════════════════════
